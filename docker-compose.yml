services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12
      POSTGRES_DB: messenger_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  app:
    build: .
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:12@db:5432/messenger_db
      SECRET_KEY: dev
      SESSION_TYPE: redis
      SESSION_REDIS_URL: redis://redis:6379/1
      SERVICE_NAME: messenger-backend
      APP_VERSION: local
      WEB_CONCURRENCY: 3
      PORT: 5000
    restart: always
    stop_grace_period: 30s
    init: true

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data: