
services:
  db:
    image: postgres:15
    #container_name: messenger-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12
      POSTGRES_DB: messenger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    #container_name: messenger-app
    depends_on:
      - db
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgresql://postgres:12@db:5432/messenger_db
      SECRET_KEY: dev
      PORT: 5000
    restart: always

volumes:
  postgres_data: