services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12
      POSTGRES_DB: messenger_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  app:
    image: ghcr.io/YOUR_GHCR_OWNER/messenger-backend:sha-YOUR_COMMIT
    depends_on:
      - db
      - redis
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgresql://postgres:12@db:5432/messenger_db
      SECRET_KEY: prod-secret
      SESSION_TYPE: redis
      SESSION_REDIS_URL: redis://redis:6379/1
      SERVICE_NAME: messenger-backend
      APP_VERSION: sha-YOUR_COMMIT
      WEB_CONCURRENCY: 3
      PORT: 5000